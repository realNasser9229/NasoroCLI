<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NasoroCLI</title>
<script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
<style>
  /* Termux-style terminal */
  body {
    background: #000;
    color: #0f0;
    font-family: "Courier New", monospace;
    padding: 0;
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  #terminal {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    white-space: pre-wrap;
    line-height: 1.2em;
    font-size: 16px;
  }

  #input {
    width: 100%;
    padding: 10px;
    border: none;
    outline: none;
    background: #000;
    color: #0f0;
    font-family: monospace;
    font-size: 16px;
  }

  #terminal::-webkit-scrollbar {
    width: 8px;
  }
  #terminal::-webkit-scrollbar-thumb {
    background: #0f0;
  }
</style>
</head>
<body>

<div id="terminal"></div>
<input id="input" placeholder="Type command..." autofocus>

<script>
let terminal = document.getElementById("terminal");
let input = document.getElementById("input");

function write(text){
    terminal.innerHTML += text + "\n";
    terminal.scrollTop = terminal.scrollHeight;
}

async function main(){
    write("⏳ Loading Pyodide...");
    let pyodide = await loadPyodide();
    write("✅ Pyodide loaded!");
    await pyodide.loadPackage("numpy");
    write("✅ Numpy ready!");

    write("⏳ Downloading NasoroCLI model from ManusCDN...");
    let response = await fetch("https://files.manuscdn.com/user_upload_by_module/session_file/310519663325278737/WaQYJiJGWkdtjUiX.onnx");
    let buffer = await response.arrayBuffer();
    write("⏳ Initializing ONNX Runtime...");
    let session = await ort.InferenceSession.create(new Uint8Array(buffer));
    write("✅ NasoroCLI model loaded!");

    function tokenize(text){
        let arr = new Float32Array(128).fill(0);
        for(let i=0;i<text.length && i<128;i++){ arr[i] = text.charCodeAt(i) % 256; }
        return new ort.Tensor("float32", arr, [1,128]);
    }

    function detokenize(tensor){
        return Array.from(tensor.data).map(x=>String.fromCharCode(x%256)).join("");
    }

    input.addEventListener("keydown", async (e)=>{
        if(e.key === "Enter"){
            let cmd = input.value;
            input.value = "";
            write("> " + cmd);
            if(cmd.toLowerCase() === "exit"){ write("👋 Bye!"); return; }

            try{
                let tensor = tokenize(cmd);
                let feeds = {};
                feeds[session.inputNames[0]] = tensor;
                let results = await session.run(feeds);
                let response = detokenize(results[session.outputNames[0]]);
                write("NasoroCLI> " + response);
            } catch(err){
                write("❌ Error: " + err);
            }
        }
    });
}

main();
</script>

</body>
</html>
